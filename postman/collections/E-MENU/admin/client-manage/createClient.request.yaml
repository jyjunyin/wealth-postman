$kind: http-request
url: "{{$baseURL}}/{{$contextPath}}/api/v1/admin/client-credentials"
method: POST
headers:
  Authorization: Bearer <your-jwt-token>
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "channel": "MOBILE_MERCHANT",
        "client_name": "Mobile Merchant Frontend",
        "redirect_uri": "https://app.wealth.com/callback",
        "grant_type": "client_credentials,password,refresh_token",
        "scope": "read write",
        "access_token_timeout": 3600,
        "refresh_token_timeout": 86400,
        "ip_whitelist": null,
        "skip_validate_ip": true
      }
order: 1000
